<form [formGroup]="form">
    <div class="grid gap-2">
        <div class="mb-3">
            <label for="IdPlan" class="block text-surface-900 dark:text-surface-0 font-medium mb-2">Chương trình<span class="text-red-500">*</span></label>
            <p-select id="IdPlan" formControlName="IdPlan" [options]="listPlan" optionLabel="ten" optionValue="id" [filter]="true" placeholder="Chọn chương trình" class="w-full mb-2" appendTo="body" />
            @if (form.get('IdPlan')?.hasError('required') && form.get('IdPlan')?.touched) {
            <p-message severity="error" variant="simple" size="small">{{ getError('IdPlan') }} </p-message>
            }
        </div>
    </div>
    <div class="grid gap-2">
        <div class="mb-3">
            <label for="fileUpload" class="block text-surface-900 dark:text-surface-0 font-medium mb-2">Upload File Excel<span class="text-red-500">*</span></label>
            <p-fileupload mode="basic" chooseLabel="Chọn file" chooseIcon="pi pi-upload" accept=".xlsx,.xls" maxFileSize="10485760" (onSelect)="onUploadChooseFile($event)" customUpload="true" auto="false" class="w-full" />
            <small class="text-surface-500">Chỉ chấp nhận file Excel (.xlsx, .xls), tối đa 10MB</small>
        </div>
    </div>
</form>

<div class="mt-5 flex flex-row justify-end">
    <p-button label="Upload" icon="pi pi-upload" (onClick)="onSubmit()" type="submit" [loading]="loading" />
</div>
