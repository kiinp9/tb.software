<h4 class="font-semibold mb-2 flex items-center gap-2 !text-3xl">
    DANH SÁCH HÀNG ĐỢI
</h4>

<p-table [value]="studentsList()" class="!text-xl" cdkDropList (cdkDropListDropped)="drop($event)">
    <!-- HEADER -->
    <ng-template pTemplate="header">
        <tr class="font-bold">
            <th class="!text-center w-12"></th>
            <th class="!text-center">STT</th>
            <th class="!text-center">MSSV</th>
            <th>Họ và Tên</th>
            <th>Ngành/Chuyên ngành</th>
            <th>Trạng thái</th>
        </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-student let-ri="rowIndex">
        <tr cdkDrag [class.slide-enter-animation]="highlightLast() && ri === studentsList().length - 1">
            <!-- Drag handle -->
            <td class="!text-center">
                <span cdkDragHandle class="cursor-move select-none">☰</span>
            </td>

            <!-- STT -->
            <td class="!text-center" [ngClass]="getRowClass(student)">
                {{ student.order }}
            </td>

            <!-- MSSV -->
            <td class="!text-center" [ngClass]="getRowClass(student)">
                {{ student.maSoSinhVien }}
            </td>

            <!-- HỌ TÊN -->
            <td [ngClass]="getRowClass(student)">
                {{ student.hoVaTen }}
            </td>

            <!-- NGÀNH -->
            <td [ngClass]="getRowClass(student)">
                {{ student.tenNganhDaoTao }}
            </td>

            <!-- TRẠNG THÁI -->
            <td [ngClass]="getRowClass(student)">
                <p-tag *ngIf="student.loaiSlide !== loaiSlide.TEXT"
                    [severity]="constStatuses.getSeverity(student.trangThai)">
                    <span class="text-xl">
                        {{ constStatuses.getName(student.trangThai) }}
                    </span>
                </p-tag>
            </td>
        </tr>
    </ng-template>
</p-table>
