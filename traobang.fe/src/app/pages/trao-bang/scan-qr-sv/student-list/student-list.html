<h4 class="font-semibold mb-2 flex items-center gap-2 !text-3xl">
    DANH SÁCH HÀNG ĐỢI
</h4>

<p-table [value]="students() || []" class="!text-xl">
    <ng-template pTemplate="header">
        <tr class="font-bold">
            <th class="!text-center">STT</th>
            <th class="!text-center">MSSV</th>
            <th>Họ và Tên</th>
            <th>Ngành/Chuyên ngành</th>
            <th>Trạng thái</th>
        </tr>
    </ng-template>

    <ng-template pTemplate="body" let-student>
        <tr>
            <td [ngClass]="{
                    '!text-center': true,
                    'bg-orange-200': student.trangThai === constStatuses.DANG_TRAO_BANG,
                    '!bg-[#ffedd5]': student.loaiSlide === loaiSlide.TEXT
                }">
                {{ student.order }}
            </td>

            <td [ngClass]="{
                    '!text-center': true,
                    'bg-orange-200': student.trangThai === constStatuses.DANG_TRAO_BANG,
                    '!bg-[#ffedd5]': student.loaiSlide === loaiSlide.TEXT
                }">
                {{ student.maSoSinhVien }}
            </td>

            <td [ngClass]="{
                    'bg-orange-200': student.trangThai === constStatuses.DANG_TRAO_BANG,
                    '!bg-[#ffedd5]': student.loaiSlide === loaiSlide.TEXT
                }">
                {{ student.hoVaTen }}
            </td>

            <td [ngClass]="{
                    'bg-orange-200': student.trangThai === constStatuses.DANG_TRAO_BANG,
                    '!bg-[#ffedd5]': student.loaiSlide === loaiSlide.TEXT
                }">
                {{ student.tenNganhDaoTao }}
            </td>

            <td [ngClass]="{
                    'bg-orange-200': student.trangThai === constStatuses.DANG_TRAO_BANG,
                    '!bg-[#ffedd5]': student.loaiSlide === loaiSlide.TEXT
                }">
                <p-tag [severity]="constStatuses.getSeverity(student.trangThai)">
                    <span class="text-xl">
                        {{ constStatuses.getName(student.trangThai) }}
                    </span>
                </p-tag>
            </td>
        </tr>
    </ng-template>
</p-table>
